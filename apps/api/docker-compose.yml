# Pinned project name so the Compose project stays stable regardless of directory.
name: ai-history

services:
  app:
    build:
      # Build context is the monorepo root so shared workspace files resolve.
      context: ../..
      dockerfile: apps/api/Dockerfile.dev
    ports:
      - '${PORT:-3232}:${PORT:-3232}'
    volumes:
      # Mount the whole repo so the in-container layout matches the workspace.
      - ../..:/app
      # Keep container-installed node_modules (avoid host/OS binary mismatch).
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/packages/i18n/node_modules
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-history-network

  postgres:
    image: postgres:16-alpine
    env_file:
      - ../../.env
    ports:
      - '${DB_PORT:-5555}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ai-history-network

volumes:
  postgres_data:

networks:
  ai-history-network:
    driver: bridge
